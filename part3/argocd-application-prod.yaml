apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-alpha-backend-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/dimabors/dawn-health-technical-assessment.git
    # CI pushes prod overlay bumps to main (after approval gate passes).
    targetRevision: main
    path: part2/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: team-alpha-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # namespace created by infra pipeline
