# Part 2 — Green deployment (new version)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-alpha-backend-green
  namespace: team-alpha
  labels:
    app: team-alpha-backend
    slot: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-alpha-backend
      slot: green
  template:
    metadata:
      labels:
        app: team-alpha-backend
        slot: green
    spec:
      serviceAccountName: team-alpha-workload-sa
      containers:
        - name: backend
          # The image reference below is a Kustomize ALIAS, not a real registry path.
          # Each overlay (part2/overlays/<env>/kustomization.yaml) maps this alias to the
          # concrete registry image + tag. "team-alpha-backend-green" is the slot the CI
          # pipeline updates on every successful build:
          #   kustomize edit set image team-alpha-backend-green=...:<imageTag>
          # The literal "set-by-overlay" is intentional — if you see it in a rendered
          # manifest the overlay didn't map the alias, which is a loud, obvious signal.
          image: team-alpha-backend-green:set-by-overlay
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
