# Part 2 — Starter file
#
# This is the base Deployment for the team-alpha backend API.
# Do NOT modify this file.
#
# Use it as the template for:
#   - part2/blue-deployment.yaml  (current stable version, tag v1.0.0, label slot: blue)
#   - part2/green-deployment.yaml (new version, tag v1.1.0, label slot: green)
#
# Then create part2/service.yaml to route traffic to one slot at a time.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-alpha-backend
  namespace: team-alpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-alpha-backend
  template:
    metadata:
      labels:
        app: team-alpha-backend
    spec:
      serviceAccountName: team-alpha-workload-sa
      containers:
        - name: backend
          image: dawnhealthacr.azurecr.io/team-alpha/backend:v1.0.0
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
