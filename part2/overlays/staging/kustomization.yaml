# Part 2 — Staging overlay
#
# Staging tracks a vetted dev version. Promotion is a PR that copies the
# resolved tag from overlays/dev/kustomization.yaml into this file.
# That PR is the audit record of "this exact version is being promoted to staging".

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: team-alpha-staging

resources:
- ../../base

images:
- name: team-alpha-backend-blue
  newName: ecapacr.azurecr.io/team-alpha/backend
  newTag: v1.1.0  # placeholder; CI bumps this on v*.*.*-preview tag
- name: team-alpha-backend-green
  newName: ecapacr.azurecr.io/team-alpha/backend
  newTag: 16-46301437082c787f1f8e003c71b53505ff6fbab6
