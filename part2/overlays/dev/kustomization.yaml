# Part 2 — Dev overlay

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

# Resolve the image aliases used in the base Deployments to concrete registry
# images and tags for the DEV environment. The CI pipeline updates the
# `team-alpha-backend-green` newTag on every successful build on main.
images:
- name: team-alpha-backend-blue
  newName: dawnhealthacr.azurecr.io/team-alpha/backend
  newTag: v1.0.0
- name: team-alpha-backend-green
  newName: ecapacr.azurecr.io/team-alpha/backend
  newTag: 5-8ab02b6d215cbc5fb080018faf04c19f6da62552
