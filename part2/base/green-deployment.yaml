apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-alpha-backend-green
  namespace: team-alpha
  labels:
    app: team-alpha-backend
    slot: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-alpha-backend
      slot: green
  template:
    metadata:
      labels:
        app: team-alpha-backend
        slot: green
    spec:
      serviceAccountName: team-alpha-workload-sa
      containers:
        - name: backend
          # Kustomize alias — CI bumps this slot on every main build:
          #   kustomize edit set image team-alpha-backend-green=...:<tag>
          # "set-by-overlay" is intentional; seeing it in a rendered manifest
          # means the overlay didn't map the alias.
          image: team-alpha-backend-green:set-by-overlay
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
