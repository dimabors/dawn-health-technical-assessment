# Part 1.2 — Starter: Multi-Window SLO Burn-Rate Alerts
#
# SLO: 99.9% of requests to team-alpha-backend succeed over a rolling 28-day window.
# This means the error budget is 0.1% of requests — or approximately 43 minutes of
# complete outage per month.
#
# Multi-window, multi-burn-rate alerting (Google SRE Workbook §5) avoids the
# pitfalls of simple threshold alerts:
#   - A fast burn alert fires early when the error rate is critically high,
#     even if it has only been happening for a few minutes.
#   - A slow burn alert fires when a lower error rate is sustained long enough
#     to meaningfully erode the monthly budget.
#
# Burn rate = (observed error rate) / (SLO error budget)
# At a burn rate of 1x, the budget is exhausted exactly at the end of the window.
# At 14x, a 99.9% SLO's monthly budget is consumed in roughly 2 days.
#
# Your tasks:
#   1. Complete the PromQL expr for both alerts using the recording rules
#      produced in Part 1.1.
#   2. The burn-rate thresholds are provided in comments — use them correctly.
#   3. Fill in the description and action annotations with meaningful content.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: team-alpha-backend-slo-alerts
  namespace: team-alpha
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: team-alpha-backend:slo
      rules:

        # Fast burn — critical
        # Fires when the error rate is high enough to exhaust the monthly budget in ~2 days.
        # Uses two windows: a long window (1h) to confirm the trend, and a short window (5m)
        # to confirm it is still happening now. Both must exceed the burn-rate threshold.
        # Threshold for 99.9% SLO: 14x burn rate = error ratio > 0.14 (14%)
        - alert: TeamAlphaBackendHighErrorBudgetBurn
          expr: |
            # TODO: Express the condition using the recording rules from Part 1.1.
            # The alert should fire when BOTH of the following are true:
            #   - The 1h error ratio exceeds 14x the SLO error rate (0.1% * 14 = 1.4%)
            #   - The 5m error ratio also exceeds 14x (confirms it is still active)
            # Use job:http_errors_total:ratio_rate5m (or an equivalent 1h version if you
            # define one) and compare against the appropriate threshold.
            TODO
          for: 2m
          labels:
            severity: critical
            team: team-alpha
            component: backend
          annotations:
            summary: "High error budget burn on team-alpha-backend ({{ $value | humanizePercentage }} error rate)"
            description: |
              TODO: Explain what this alert means in terms of error budget.
              At the current burn rate, how quickly will the monthly budget be exhausted?
              What is the patient-facing impact?
            action: |
              TODO: List the first 3 steps an on-call engineer should take immediately.
              Include specific kubectl or Grafana commands.

        # Slow burn — warning
        # Fires when a lower but sustained error rate will exhaust the budget within ~5 days.
        # Uses longer windows: 6h and 30m.
        # Threshold for 99.9% SLO: 6x burn rate = error ratio > 0.6% over 6h
        - alert: TeamAlphaBackendMediumErrorBudgetBurn
          expr: |
            # TODO: Same pattern as above but using 6h and 30m windows.
            # Threshold: 6x burn rate = error ratio > 0.006 (0.6%)
            # Both the 6h and 30m ratios must exceed the threshold.
            TODO
          for: 15m
          labels:
            severity: warning
            team: team-alpha
            component: backend
          annotations:
            summary: "Elevated error budget burn on team-alpha-backend ({{ $value | humanizePercentage }} error rate)"
            description: |
              TODO: Explain the impact of this burn rate on the monthly error budget.
              At 6x burn rate, when will the budget be exhausted?
            action: |
              TODO: First 3 steps an on-call engineer should take.
              At this severity level, is immediate action required or can it wait for business hours?
