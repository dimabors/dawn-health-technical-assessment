# GitHub Actions equivalent of part2/pipeline.yml.
#
# Uses Azure OIDC federation (no long-lived secrets in GitHub) to push to ACR.
# Mirrors the same stages: build -> test -> Trivy scan -> push -> GitOps bump.
#
# Required GitHub repo variables (Settings -> Secrets and variables -> Actions -> Variables):
#   AZURE_CLIENT_ID         App registration client ID with AcrPush on ACR
#   AZURE_TENANT_ID         Azure AD tenant
#   AZURE_SUBSCRIPTION_ID   Subscription containing ACR
#   ACR_NAME                e.g. dawnhealthacr (without .azurecr.io)
#
# OIDC trust setup is documented in the chat reply.

name: ci

on:
  push:
    branches: [main, "context/devops-dev", "context/devops", "feature/**"]
    tags:
      - "v*.*.*"           # release build → bumps green (stable slot)
      - "v*.*.*-preview"   # preview build → bumps blue (preview slot)
  pull_request:
    branches: [main, "context/devops-dev", "context/devops"]
  workflow_dispatch:

permissions:
  id-token: write   # required for Azure OIDC
  contents: write   # required to push the GitOps commit back
  pull-requests: read

env:
  IMAGE_REPOSITORY: team-alpha/backend
  REGISTRY: ${{ vars.ACR_NAME }}.azurecr.io
  # When triggered by a semver tag (v1.2.3) use the tag as the image tag so
  # APP_VERSION inside the container matches. Otherwise fall back to the
  # run-number + SHA for traceability on branch builds.
  IMAGE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('{0}-{1}', github.run_number, github.sha) }}

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    # Declaring an environment makes the OIDC subject claim 'environment:dev'
    # regardless of whether the trigger is a branch push, tag push, or PR.
    # This means a single FIC (gh-env-dev) covers all build triggers without
    # needing per-tag or per-branch FICs (managed identity FICs don't support wildcards).
    environment: dev
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
      is_promotion: ${{ steps.set-tag.outputs.is_promotion }}
    steps:
      - uses: actions/checkout@v4

      # ---- Decide: build a new image OR promote an existing one ---------------
      # Promotion branches (context/devops → staging, main → prod) reuse the
      # immutable tag already validated in the previous environment — no rebuild.
      - name: Resolve image tag
        id: set-tag
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == "context/devops" ]]; then
            # Staging promotion: read the green tag that is live in dev
            TAG=$(grep -A2 'name: team-alpha-backend-green' part2/overlays/dev/kustomization.yaml \
                  | grep 'newTag:' | awk '{print $2}')
            echo "Promoting dev->staging: $TAG"
            echo "image_tag=$TAG"    >> "$GITHUB_OUTPUT"
            echo "is_promotion=true" >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == "main" ]]; then
            # Prod promotion: read the green tag that is live in staging
            TAG=$(grep -A2 'name: team-alpha-backend-green' part2/overlays/staging/kustomization.yaml \
                  | grep 'newTag:' | awk '{print $2}')
            echo "Promoting staging->prod: $TAG"
            echo "image_tag=$TAG"    >> "$GITHUB_OUTPUT"
            echo "is_promotion=true" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
            echo "is_promotion=false"   >> "$GITHUB_OUTPUT"
          fi

      # ---- Auth to Azure / ACR via OIDC (no stored passwords) -----------------
      # Skipped for promotion branches — no image to push.
      - name: Azure login (OIDC)
        if: "steps.set-tag.outputs.is_promotion == 'false' && github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/heads/feature/')"
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: "steps.set-tag.outputs.is_promotion == 'false' && github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/heads/feature/')"
        run: az acr login --name "${{ vars.ACR_NAME }}"

      # ---- Build (skipped for promotion branches) -----------------------------
      - name: Build image
        if: "steps.set-tag.outputs.is_promotion == 'false'"
        run: |
          docker build \
            -f part4/Dockerfile.hardened \
            --build-arg APP_VERSION="$IMAGE_TAG" \
            -t "$REGISTRY/$IMAGE_REPOSITORY:$IMAGE_TAG" \
            part4

      # ---- Test inside the container (skipped for promotion branches) ---------
      - name: Run unit tests in container
        if: "steps.set-tag.outputs.is_promotion == 'false'"
        run: |
          docker run --rm \
            "$REGISTRY/$IMAGE_REPOSITORY:$IMAGE_TAG" \
            npm test

      # ---- Vulnerability scan (skipped for promotion branches) ----------------
      # Same logic as pipeline.yml: exit 2 = criticals found, exit 1 = scanner error.
      - name: Trivy scan (CRITICAL only)
        if: "steps.set-tag.outputs.is_promotion == 'false'"
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --exit-code 3 \
            --severity CRITICAL \
            --no-progress \
            "$REGISTRY/$IMAGE_REPOSITORY:$IMAGE_TAG"
          ec=$?
          if [ $ec -eq 3 ]; then
            echo "::error::CRITICAL vulnerabilities found"; exit 3
          elif [ $ec -ne 0 ]; then
            echo "::error::Trivy failed with exit $ec"; exit 1
          fi

      # ---- Push (skipped for promotion branches and PRs/feature branches) -----
      - name: Push image
        if: "steps.set-tag.outputs.is_promotion == 'false' && github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/heads/feature/')"
        run: docker push "$REGISTRY/$IMAGE_REPOSITORY:$IMAGE_TAG"

  update-gitops:
    name: Bump overlay and promote
    needs: build-test-scan
    # Skip for feature branches and PRs — they only build/test/scan.
    if: "github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/heads/feature/') && success()"
    # Approval gate: add Required Reviewers in GitHub → Settings → Environments.
    # dev/staging pass through automatically unless reviewers are configured.
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'context/devops' && 'staging' || 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -sS "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump overlay
        env:
          IMAGE_TAG: ${{ needs.build-test-scan.outputs.image_tag }}
        run: |
          set -euo pipefail
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name  "${{ github.actor }}"

          # Each branch/tag owns one overlay.
          # Tags always push the gitops commit back to context/devops-dev
          # (they represent a dev→prod promotion flow starting in dev).
          case "${{ github.ref_name }}" in
            main)              OVERLAY=prod;    PUSH_BRANCH=main;               SLOT=green ;;
            context/devops)    OVERLAY=staging; PUSH_BRANCH=context/devops;    SLOT=green ;;
            v*.*.*-preview)    OVERLAY=dev;     PUSH_BRANCH=context/devops-dev; SLOT=blue  ;;
            v*.*.*)            OVERLAY=dev;     PUSH_BRANCH=context/devops-dev; SLOT=green ;;
            *)                 OVERLAY=dev;     PUSH_BRANCH="${{ github.ref_name }}"; SLOT=green ;;
          esac

          cd part2/overlays/$OVERLAY
          kustomize edit set image \
            "team-alpha-backend-$SLOT=$REGISTRY/$IMAGE_REPOSITORY:$IMAGE_TAG"
          cd -

          git add part2/overlays/$OVERLAY/kustomization.yaml
          git commit -m "ci: bump $OVERLAY team-alpha-backend-$SLOT to $IMAGE_TAG [skip ci]"
          # Push back to the branch (not the tag ref, which is read-only).
          git push origin HEAD:$PUSH_BRANCH
