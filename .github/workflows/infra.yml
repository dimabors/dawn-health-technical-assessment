# Infrastructure deployment — pure Bicep + kubectl, no PowerShell scripts.
#
# Auth: GitHub OIDC -> federated credential on UAMI 'id-team-alpha-gha-deployer'.
#
# Required GitHub repo VARIABLES (Settings -> Secrets and variables -> Actions
# -> Variables tab; these are public IDs, not secrets):
#   AZURE_CLIENT_ID         clientId of id-team-alpha-gha-deployer
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#   AZURE_RG                rg-team-alpha
#   AZURE_LOCATION          northeurope
#   AKS_CLUSTER             aks-shared
#   ACR_NAME                ecapacr
#   GH_REPO                 dimabors/dawn-health-technical-assessment

# context/devops-dev = deploy to dev only
# context/devops     = deploy to staging
# main               = deploy to prod
name: infra

on:
  push:
    branches: ['context/devops-dev', 'context/devops', 'main']
  pull_request:
    branches: ['context/devops-dev', 'context/devops', 'main']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash

jobs:

  # ------------------------------------------------------------------
  # PR: lint + what-if (no actual deployment).
  # ------------------------------------------------------------------
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref == 'main' && 'prod' || github.base_ref == 'context/devops' && 'staging' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep build
        run: |
          az bicep build --file deploy/bicep/platform.bicep          --stdout > /dev/null
          az bicep build --file deploy/bicep/workload-identity.bicep --stdout > /dev/null
          az bicep build --file deploy/bicep/gha-deployer.bicep      --stdout > /dev/null

      - name: What-if (platform)
        run: |
          az deployment group what-if \
            --resource-group "${{ vars.AZURE_RG }}" \
            --template-file deploy/bicep/platform.bicep \
            --parameters location='${{ vars.AZURE_LOCATION }}' \
                         aksClusterName='${{ vars.AKS_CLUSTER }}' \
                         acrName='${{ vars.ACR_NAME }}'

      - name: What-if (workload identity)
        run: |
          az deployment group what-if \
            --resource-group "${{ vars.AZURE_RG }}" \
            --template-file deploy/bicep/workload-identity.bicep \
            --parameters aksClusterName='${{ vars.AKS_CLUSTER }}'

  # ------------------------------------------------------------------
  # Deploy: gha-deployer (self-managing) -> platform -> workload identity
  # -> kubeconfig -> per-env namespace + ServiceAccount.
  # ------------------------------------------------------------------
  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'context/devops' && 'staging' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Resource provider registration is a subscription-scope action, performed
      # once during local bootstrap (see deploy/INITIAL-DEPLOY.md). The deployer
      # UAMI is intentionally Contributor on the RG only.

      - name: Deploy GitHub Actions deployer (self-managing)
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RG }}" \
            --name "gha-deployer-${{ github.run_number }}" \
            --template-file deploy/bicep/gha-deployer.bicep \
            --parameters repo='${{ vars.GH_REPO }}' \
                         branch='${{ github.ref_name }}'

      - name: Wait for AKS to reach a terminal state
        run: |
          STATE=$(az aks show -g "${{ vars.AZURE_RG }}" -n "${{ vars.AKS_CLUSTER }}" \
                    --query provisioningState -o tsv 2>/dev/null || echo "NotFound")
          echo "AKS provisioning state: $STATE"
          if [[ "$STATE" == "Updating" || "$STATE" == "Creating" ]]; then
            echo "Cluster is busy — waiting up to 10 min for it to finish..."
            az aks wait -g "${{ vars.AZURE_RG }}" -n "${{ vars.AKS_CLUSTER }}" \
              --updated --interval 30 --timeout 600
          fi

      - name: Deploy platform (ACR + AKS + AcrPull)
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RG }}" \
            --name "platform-${{ github.run_number }}" \
            --template-file deploy/bicep/platform.bicep \
            --parameters location='${{ vars.AZURE_LOCATION }}' \
                         aksClusterName='${{ vars.AKS_CLUSTER }}' \
                         acrName='${{ vars.ACR_NAME }}'

      - name: Resolve target environments for this branch
        id: envs
        run: |
          # context/devops-dev -> dev only
          # context/devops    -> dev + staging
          # main              -> dev + staging + prod
          case "${{ github.ref_name }}" in
            main)               ENVS='["dev","staging","prod"]' ;;
            context/devops)     ENVS='["dev","staging"]' ;;
            *)                  ENVS='["dev"]' ;;
          esac
          echo "environments=$ENVS" >> "$GITHUB_OUTPUT"

      - name: Deploy workload identity (scoped to branch environments)
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RG }}" \
            --name "wi-${{ github.run_number }}" \
            --template-file deploy/bicep/workload-identity.bicep \
            --parameters aksClusterName='${{ vars.AKS_CLUSTER }}' \
                         environments='${{ steps.envs.outputs.environments }}'
          az deployment group show \
            --resource-group "${{ vars.AZURE_RG }}" \
            --name "wi-${{ github.run_number }}" \
            --query 'properties.outputs.environments.value' \
            -o json > wi-outputs.json
          cat wi-outputs.json

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            -g "${{ vars.AZURE_RG }}" \
            -n "${{ vars.AKS_CLUSTER }}" \
            --overwrite-existing
          az aks install-cli >/dev/null 2>&1 || true

      - name: Apply namespace + ServiceAccount per environment
        env:
          SA_NAME: team-alpha-workload-sa
        run: |
          for row in $(jq -c '.[]' wi-outputs.json); do
            export ENVIRONMENT=$(echo "$row" | jq -r '.environment')
            export NAMESPACE=$(echo "$row"   | jq -r '.namespace')
            export UAMI_CLIENT_ID=$(echo "$row" | jq -r '.uamiClientId')
            echo "==> $ENVIRONMENT  ns=$NAMESPACE  clientId=$UAMI_CLIENT_ID"
            envsubst < deploy/k8s/namespace-sa.yaml | kubectl apply -f -
          done

      - name: Install ArgoCD (idempotent)
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          # --server-side avoids the 256 KB annotation limit hit by the applicationsets CRD.
          # --force-conflicts takes ownership of fields previously managed by kubectl-client-side-apply.
          kubectl apply -n argocd --server-side --force-conflicts \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl wait --for=condition=available deployment/argocd-server \
            -n argocd --timeout=180s

      - name: Apply ArgoCD Applications
        run: |
          # Apply only the Applications relevant to this branch's environments.
          case "${{ github.ref_name }}" in
            main)
              kubectl apply -f part3/argocd-application.yaml \
                            -f part3/argocd-application-staging.yaml \
                            -f part3/argocd-application-prod.yaml ;;
            context/devops)
              kubectl apply -f part3/argocd-application.yaml \
                            -f part3/argocd-application-staging.yaml ;;
            *)
              kubectl apply -f part3/argocd-application.yaml ;;
          esac

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: workload-identity-outputs
          path: wi-outputs.json
